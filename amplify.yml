version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        # Generate server-only config file with AWS credentials at build time.
        # Amplify env vars are NOT available in the SSR Lambda runtime,
        # so we bake them into a TypeScript module that only server code imports.
        - |
          cat > src/lib/aws-config.generated.ts << CONFIGEOF
          import "server-only";
          export const AWS_CONFIG = {
            region: "${ADMIN_AWS_REGION:-us-east-1}",
            accessKeyId: "${ADMIN_AWS_ACCESS_KEY_ID:-}",
            secretAccessKey: "${ADMIN_AWS_SECRET_ACCESS_KEY:-}",
            username: "${ADMIN_AWS_USERNAME:-}",
          } as const;
          CONFIGEOF
          echo "Generated aws-config with region=${ADMIN_AWS_REGION}"
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
