version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        # Write env vars to .env.production.local so Next.js SSR can read them at runtime
        # Amplify env vars are only available at build time, not in the Lambda runtime
        - echo "ADMIN_AWS_REGION=$ADMIN_AWS_REGION" >> .env.production.local
        - echo "ADMIN_AWS_ACCESS_KEY_ID=$ADMIN_AWS_ACCESS_KEY_ID" >> .env.production.local
        - echo "ADMIN_AWS_SECRET_ACCESS_KEY=$ADMIN_AWS_SECRET_ACCESS_KEY" >> .env.production.local
        - echo "ADMIN_AWS_USERNAME=$ADMIN_AWS_USERNAME" >> .env.production.local
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
